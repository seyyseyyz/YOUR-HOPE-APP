  <style>
    .quotes-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .quotes-hero {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px 0;
    }

    .quotes-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #2d3748;
    }

    .quotes-subtitle {
      font-size: 14px;
      color: #718096;
      font-weight: 400;
    }

    .quotes-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 40px;
    }

    .quote-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      padding: 24px;
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .quote-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    .quote-card::before {
      content: '"';
      position: absolute;
      top: 10px;
      left: 16px;
      font-size: 48px;
      opacity: 0.2;
      font-weight: bold;
    }

    .quote-text {
      font-size: 16px;
      line-height: 1.6;
      font-weight: 400;
      margin: 0;
      padding: 0 0 0 0;
    }

    /* Alternate gradient colors */
    .quote-card:nth-child(2) {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.2);
    }

    .quote-card:nth-child(2):hover {
      box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
    }

    .quote-card:nth-child(3) {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.2);
    }

    .quote-card:nth-child(3):hover {
      box-shadow: 0 8px 25px rgba(79, 172, 254, 0.3);
    }

    .quote-card:nth-child(4) {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      box-shadow: 0 4px 15px rgba(67, 233, 123, 0.2);
    }

    .quote-card:nth-child(4):hover {
      box-shadow: 0 8px 25px rgba(67, 233, 123, 0.3);
    }

    .quote-card:nth-child(5) {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      box-shadow: 0 4px 15px rgba(250, 112, 154, 0.2);
    }

    .quote-card:nth-child(5):hover {
      box-shadow: 0 8px 25px rgba(250, 112, 154, 0.3);
    }

    /* Cycle through gradients */
    .quote-card:nth-child(6n+1) {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .quote-card:nth-child(6n+2) {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .quote-card:nth-child(6n+3) {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .quote-card:nth-child(6n+4) {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }

    .quote-card:nth-child(6n+5) {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }

    .quote-card:nth-child(6n+6) {
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
    }

    @media (max-width: 768px) {
      .quotes-title {
        font-size: 24px;
      }

      .quote-text {
        font-size: 14px;
      }

      .quote-card {
        padding: 18px;
      }
    }
  </style>

    "бһҮбһёбһңбһ·бһҸбһўбһ¶бһ…бһҳбһ¶бһ“бһ–бҹ’бһҷбһ»бҹҮбһӣбҹҒбһ…бһ…бҹҒбһүбҹ” бһЎбһҫбһ„бһҖбһҳбҹ’бһ–бһҹбҹӢ бһ бһҫбһҷбһҠбҹ„бҹҮбһӣбҹӮбһ„бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҡбһ„бҹ’бһ бһ“бҹӢбҹ” бһҲбһ¶бһҖбҹӢбһ“бһ№бһ„бһ”бҹ’бһҡбһ№бһ„бһЎбһҫбһ„бһҷбҹүбһ¶бһ„бһӣбһҝбһ“",

    "бһҳбһ·бһ“бһҗбһ¶бһҳбһ¶бһ“бһўбҹ’бһңбһёбһҖбһҫбһҸбһЎбһҫбһ„бһҖбҹ’бһҠбһё бһўбҹ’бһ“бһҖбһҒбҹ’бһӣбһ¶бҹҶбһ„бһӮбҹ’бһҡбһ¶бһ“бҹӢбһӮбһ¶бҹҶбһ„бһңбһ¶",
    "бһңбһ¶бһҳбһ·бһ“бһҸбҹӮбһ„бһҸбҹӮбһ„бһ¶бһҷбһҹбҹ’бһҡбһҪбһӣ бһңбһ¶бһҳбһ·бһ“бһҸбҹӮбһ„бһҸбҹӮбһҹбһ”бҹ’бһ”бһ¶бһҷбһҖбҹ’бһ”бһ¶бһӣбһ‘бҹҒбҹ” бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһӣбһ‘бҹ’бһ’бһ•бһӣ бһңбһ¶бһҸбҹӮбһ„бһҸбҹӮбһҳбһ¶бһ“бһҸбһҳбҹ’бһӣбҹғ",
    "бһҠбһјбһ…бҹ’бһ“бҹҒбҹҮ бһҗбҹӮбһҳбһ‘бһ¶бҹҶбһ„бһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҗбһ¶бһ“бһҖбһ¶бһҡбһҺбҹҚбһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһўбһ¶бһ…бһҡбһҫбһҹбһҷбһҖ",
    "бһ–бҹҒбһӣбһҒбҹ’бһӣбҹҮбһңбһ¶бһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһҹбҹ’бһңбһ¶бһӣбһҖбҹ’бһҡбҹ„бһҷбһҳбһҖбһҠбһҫбһҳбҹ’бһ”бһёбһҲбһ¶бһ“бһ‘бҹ…бһ…бҹҖбһ„бһҗбҹ’бһҳбһё",
    "бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһӣбҹ’бһўбһ”бҹҶбһ•бһ»бһҸбһҠбҹӮбһӣбһҹбҹ’бһҠбһ·бһҸбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ бһҜбһҺбһ¶бһҷбҹүбһ¶бһ„бһҖбҹҸбһҠбҹ„бһҷ",
    "бһўбҹ’бһ“бһҖбһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡ бһўбҹ’бһ“бһҖбһҹбһҳбһҡбһҳбҹ’бһҷбһҠбҹӮбһӣбһӣбҹ’бһўбһ”бҹҶбһ•бһ»бһҸ бһўбҹ’бһ“бһҖбһ“бҹ…бһ‘бһёбһ“бҹҒбҹҮбһҠбҹ„бһҷбһ бҹҒбһҸбһ»бһ•бһӣ",
    "бһўбҹ’бһңбһёбһӮбҹ’бһҡбһ”бҹӢбһҷбҹүбһ¶бһ„бһҖбһҫбһҸбһЎбһҫбһ„бһҠбҹ„бһҷбһ бҹҒбһҸбһ»бһ•бһӣбҹ” бһҮбһёбһңбһ·бһҸбһ”бһ„бҹ’бһңбһ·бһӣбһҖбҹ’бһ“бһ»бһ„бһӣбҹ„бһ„бһҖбҹ’бһҡбҹ„бһҷ бһҠбһјбһ…бҹ’бһ“бҹҒбҹҮбһўбҹ’бһ“бһҖбһўбһ¶бһ…бһҡбҹҶбһҺбһҫбһҡбһҠбҹ’бһҶбһ¶бһ”бҹӢбҹ” бһҡбһҹбҹӢбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҮбһёбһңбһ·бһҸ бһҶбһ¶бһ”бҹӢбһҶбҹ’бһ„бһҫбһҷ бһЎбһҫбһ„бһӣбҹӮбһ„бҹ” бһҠбҹ„бҹҮбһӣбҹӮбһ„бһ…бһ¶бһ”бҹӢбһ–бһёбһўбһҸбһёбһҸбһҖбһ¶бһӣ"
  ];

  let curLang = 'eng';

  function setLangQuote(lang) {
    curLang = lang;
    document.querySelectorAll('.lang-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && lang === 'eng') || (i === 1 && lang === 'kh'));
    });
    renderQuotes();
  }

  function renderQuotes() {
    const quotes = curLang === 'eng' ? QUOTES_ENG : QUOTES_KH;
    const grid = document.getElementById('quotes-grid');
    grid.innerHTML = '';
    
    quotes.forEach(quote => {
      const card = document.createElement('div');
      card.className = 'quote-card';
      card.innerHTML = `<p class="quote-text">${quote}</p>`;
      grid.appendChild(card);
    });
  }

  function updateLabels() {
    if (curLang === 'eng') {
      document.getElementById('quotes-title').textContent = 'Daily Inspiration';
      document.getElementById('quotes-subtitle').textContent = 'Take a moment to find your daily dose of motivation and hope';
    } else {
      document.getElementById('quotes-title').textContent = 'бһҖбһ¶бһҡбһӣбһҫбһҖбһ‘бһ№бһҖбһ…бһ·бһҸбҹ’бһҸбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҗбҹ’бһ„бҹғ';
      document.getElementById('quotes-subtitle').textContent = 'бһ…бҹҶбһҺбһ¶бһҷбһ–бҹҒбһӣбһҠбһҫбһҳбҹ’бһ”бһёбһҹбҹ’бһңбһ¶бһҷбһҳбһҫбһӣбһҖбһ¶бһҡбһӣбһҫбһҖбһ‘бһ№бһҖбһ…бһ·бһҸбҹ’бһҸбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҗбҹ’бһ„бҹғ';
    }
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', () => {
    renderQuotes();
    updateLabels();
  });
</script>
